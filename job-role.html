<!DOCTYPE html>
<html>
<head>
<title>Job Role Modifier</title>
</head>

<body>

<h2>Job Role Modifier</h2>

<script>

let role = "python developer";

// Replace python → javascript
let newRole = role.replace("python","javascript");
console.log("Replaced Role:", newRole);

// Starts with python
console.log("Starts with python:", role.startsWith("python"));

// Ends with developer
console.log("Ends with developer:", role.endsWith("developer"));

</script>

</body>
</html>
