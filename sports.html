<!DOCTYPE html>
<html>
<head>
<title>Sports Data Slice</title>
</head>

<body>

<h2>Sports Data Slice</h2>

<script>

let sports = ["cricket","football","tennis","hockey","golf"];

// football and tennis
let result1 = sports.slice(1,3);
console.log("Football and Tennis:", result1);

// first 3 sports
let result2 = sports.slice(0,3);
console.log("First 3 Sports:", result2);

</script>

</body>
</html>
