<!DOCTYPE html>
<html>
<head>
<title>Username Formatter</title>
</head>

<body>

<h2>Username Formatter</h2>

<script>

let username = "   Ramya Reddy   ";

let trimmed = username.trim();
console.log("Trimmed:", trimmed);

console.log("Uppercase:", trimmed.toUpperCase());

console.log("Lowercase:", trimmed.toLowerCase());

console.log("First 6 characters:", trimmed.slice(0,6));

</script>

</body>
</html>
