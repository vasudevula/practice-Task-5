<!DOCTYPE html>
<html>
<head>
<title>Employee Salary Analysis</title>
</head>

<body>

<h2>Employee Salary Analysis</h2>

<script>

let employees = [
 {name:"Ravi", salary:25000},
 {name:"Meena", salary:60000},
 {name:"Arun", salary:45000},
 {name:"Priya", salary:80000},
 {name:"John", salary:30000}
];

// Salary > 40000
let highSalary = employees.filter(function(emp){
 return emp.salary > 40000;
});
console.log("Salary > 40000:", highSalary);

// First salary > 70000
let firstHigh = employees.find(function(emp){
 return emp.salary > 70000;
});
console.log("First salary > 70000:", firstHigh);

// Total salary
let totalSalary = employees.reduce(function(sum, emp){
 return sum + emp.salary;
},0);
console.log("Total Salary:", totalSalary);

// Any salary < 20000
let below20k = employees.some(function(emp){
 return emp.salary < 20000;
});
console.log("Any salary below 20000:", below20k);

// All salary > 20000
let allAbove20k = employees.every(function(emp){
 return emp.salary > 20000;
});
console.log("All salary above 20000:", allAbove20k);

</script>

</body>
</html>
