<!DOCTYPE html>
<html>
<head>
<title>Student Marks Analyzer</title>
</head>

<body>

<h2>Student Marks Analyzer</h2>

<script>

let marks = [45,90,23,67,88,12];

marks.sort(function(a,b){
 return a-b;
});
console.log("Ascending:", marks);

marks.sort(function(a,b){
 return b-a;
});
console.log("Descending:", marks);

marks.reverse();
console.log("Reversed:", marks);

</script>

</body>
</html>
